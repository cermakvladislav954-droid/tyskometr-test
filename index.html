<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Тискометр</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Roboto:wght@500&display=swap" rel="stylesheet">
<style>
html, body { margin:0; padding:0; overflow:hidden; height:100%; }
body { background:linear-gradient(180deg,#02162b,#000814); color:white; font-family:'Orbitron',sans-serif; display:flex; justify-content:center; align-items:center; user-select:none; touch-action:none; }

.panel { background:#0b0f16; border-radius:20px; padding:16px; width:75%; max-width:300px; box-shadow:0 0 30px rgba(0,0,0,0.8); border:1px solid #2b2b2b; display:flex; flex-direction:column; align-items:center; }

.title { font-size:20px; text-align:center; color:#8ff5ff; }
.subtitle { font-size:11px; color:#aaa; margin-bottom:12px; }

.scaleBox { background:#05070a; border-radius:12px; padding:10px; border:1px solid #333; width:100%; height:70px; display:flex; flex-direction:column; align-items:center; justify-content:center; }
.scale { display:flex; gap:3px; width:100%; height:100%; align-items:flex-end; justify-content:center; }
.bar { width:6px; background:#222; border-radius:5px; }

.bottom { display:flex; gap:8px; margin-top:12px; width:100%; }
.displayBox { flex:1; background:#05070a; border-radius:12px; padding:10px; border:1px solid #333; text-align:center; }
.number { font-size:36px; }

.modeBtn { height:36px; padding:10px; border-radius:5px; border:none; font-family:'Roboto'; background:#00eaff; }

.sliderBox { width:100%; height:30px; background:#222; border-radius:10px; margin-top:15px; position:relative; display:none; }
.slider { width:30px; height:30px; background:#00eaff; border-radius:50%; position:absolute; top:0; left:0; }

.flash-danger { animation:flashDanger 1s infinite; }
@keyframes flashDanger { 50%{background:#5a0000;} }
.dangerNumber { color:#ff2a2a; }
</style>
</head>

<body>
<div class="panel">

<div class="title">🇺🇦 ТИСКОМЕТР</div>
<div class="subtitle">TM FIX</div>

<div class="scaleBox" id="btn">
<div>ШКАЛА ТИСКУ</div>
<div class="scale" id="scale"></div>
</div>

<div class="bottom">
<div class="displayBox"><div class="number" id="num">0</div></div>
<button class="modeBtn" id="modeBtn">Рандомний</button>
</div>

<div class="sliderBox" id="sliderBox">
<div class="slider" id="slider"></div>
</div>

</div>

<script>
// шкала
let scale=document.getElementById("scale");
for(let i=0;i<25;i++){let b=document.createElement("div");b.className="bar";b.style.height="26px";scale.appendChild(b);}

let mode=0,value=0,isRunning=false,cooldown=false,hold=false;

let btn=document.getElementById("btn"),num=document.getElementById("num"),modeBtn=document.getElementById("modeBtn");
let sliderBox=document.getElementById("sliderBox");
let slider=document.getElementById("slider");

// 🔊 розблокування звуку (ВАЖЛИВО для мобілки)
document.body.addEventListener("click",()=>{highSound.play().then(()=>highSound.pause()).catch(()=>{});},{once:true});

// 🔊 звук 90+
let highSound=new Audio("sound/1.mp3");
highSound.volume=0.7;
let loop=null;

function startSound(){
  if(loop) return;
  loop=setInterval(()=>{
    highSound.currentTime=0;
    highSound.play();
  },2300);
}

function stopSound(){
  if(loop){clearInterval(loop);loop=null;}
  highSound.pause();
  highSound.currentTime=0;
}

function update(val,final=false){
  let bars=document.querySelectorAll(".bar");
  bars.forEach((b,i)=>{
    if(i<val/4)b.style.background="red";
    else b.style.background="#222";
  });

  if(final && val>=90){
    startSound();
    num.classList.add("dangerNumber");
  }else{
    stopSound();
    num.classList.remove("dangerNumber");
  }
}

// режими
modeBtn.onclick=()=>{
  if(isRunning||cooldown) return;
  stopSound();
  mode=(mode+1)%4;
  value=0;
  num.innerText=0;
  update(0);

  sliderBox.style.display=(mode===3)?"block":"none";

  if(mode===0) modeBtn.innerText="Рандомний";
  else if(mode===1) modeBtn.innerText="Утримання";
  else if(mode===2) modeBtn.innerText="Дотик";
  else modeBtn.innerText="Ручний";
};

// рандом
function randomMode(){
  if(isRunning||mode!==0||cooldown) return;

  stopSound();
  isRunning=true;
  value=0;

  let final=Math.floor(Math.random()*100);

  let int=setInterval(()=>{
    value+=Math.random()*4;
    if(value>=final){
      value=final;
      clearInterval(int);
      isRunning=false;
      cooldown=true;
      setTimeout(()=>cooldown=false,1300);
    }

    num.innerText=Math.floor(value);
    update(value,true);

  },60);
}

// утримання
setInterval(()=>{
  if(mode!==1) return;

  if(hold) value+=2;
  else value-=1;

  value=Math.max(0,Math.min(100,value));
  num.innerText=value;
  update(value,true);

},50);

// РУЧНИЙ (ФІКС)
function setSlider(x){
  let rect=sliderBox.getBoundingClientRect();
  let v=(x-rect.left)/rect.width*100;
  v=Math.max(0,Math.min(100,v));
  value=Math.round(v);

  slider.style.left=(v/100)*(rect.width-30)+"px";

  num.innerText=value;
  update(value,true);
}

let drag=false;
slider.onmousedown=()=>drag=true;
document.onmouseup=()=>drag=false;
document.onmousemove=e=>{if(mode===3&&drag)setSlider(e.clientX);};

slider.ontouchstart=()=>drag=true;
document.ontouchend=()=>drag=false;
document.ontouchmove=e=>{if(mode===3&&drag)setSlider(e.touches[0].clientX);};

// події
btn.onmousedown=()=>{if(mode===1)hold=true;};
btn.onmouseup=()=>hold=false;
btn.onmouseleave=()=>hold=false;

btn.onclick=()=>{if(mode===0)randomMode();};

</script>
</body>
</html>

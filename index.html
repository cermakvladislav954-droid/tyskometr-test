<!DOCTYPE html> 
<html lang="uk">
<head>
<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<title>Тискометр</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">

<style>

html, body{
  margin:0;
  padding:0;
  overflow:hidden;
  height:100%;
}

body{
  background:linear-gradient(180deg,#02162b,#000814);
  color:white;
  font-family:'Orbitron',sans-serif;
  display:flex;
  justify-content:center;
  align-items:center;
  -webkit-user-select:none; 
  user-select:none;
  touch-action:none;
}

/* 🔽 ЩЕ МЕНШЕ */
.panel{
  background:#0b0f16;
  border-radius:20px;
  padding:16px;
  width:75%;
  max-width:300px;
  box-shadow:0 0 30px rgba(0,0,0,0.8);
  border:1px solid #2b2b2b;
}

.title{
  font-size:20px;
  text-align:center;
  color:#8ff5ff;
  margin-bottom:5px;
}

.subtitle{
  text-align:center;
  color:#aaa;
  margin-bottom:12px;
  font-size:11px;
}

.scaleBox{
  background:#05070a;
  border-radius:12px;
  padding:10px;
  border:1px solid #333;
  cursor:pointer;
}

.scale{
  display:flex;
  gap:3px;
  justify-content:center;
  margin:8px 0;
}

.bar{
  width:6px;
  height:26px;
  background:#222;
  border-radius:5px;
}

.bottom{
  display:flex;
  gap:8px;
  margin-top:12px;
}

.displayBox{
  flex:1;
  background:#05070a;
  border-radius:12px;
  padding:10px;
  border:1px solid #333;
}

.number{
  font-size:36px;
  text-align:center;
}

.modeBtn{
  padding:10px;
  border-radius:20px;
  border:none;
  font-size:12px;
  background:#00eaff;
  color:black;
  cursor:pointer;
}

.message{
  text-align:center;
  margin-top:8px;
  font-size:11px;
  color:#ccc;
}

.flash-danger {
  animation: flashDanger 1s infinite;
}

@keyframes flashDanger {
  50% { background:#5a0000; }
}

.dangerNumber{
  color:#ff2a2a;
}
</style>
</head>

<body>
<div class="panel">

  <div class="title">🇺🇦 ТИСКОМЕТР</div>
  <div class="subtitle">TM-v2.3 FINAL</div>

  <div class="scaleBox" id="btn">
    <div>ШКАЛА ТИСКУ</div>
    <div class="scale" id="scale"></div>
  </div>

  <div class="bottom">
    <div class="displayBox">
      <div class="number" id="num">0</div>
    </div>

    <button class="modeBtn" id="modeBtn">Рандомний</button>
  </div>

  <div class="message" id="msg">
    Натисни або утримуй
  </div>

</div>

<script>

// шкала
let scale = document.getElementById("scale")
for (let i = 0; i < 25; i++) {
  let bar = document.createElement("div")
  bar.className = "bar"
  scale.appendChild(bar)
}

let mode = 0
let isRunning = false
let hold = false
let value = 0

let btn = document.getElementById("btn")
let num = document.getElementById("num")
let msg = document.getElementById("msg")
let modeBtn = document.getElementById("modeBtn")

/* звук */
let audioCtx = new (window.AudioContext || window.webkitAudioContext)()
let lastBeep = 0

function beep(){
  let now = Date.now()
  if (now - lastBeep < 120) return
  lastBeep = now

  let osc = audioCtx.createOscillator()
  let gain = audioCtx.createGain()
  osc.connect(gain)
  gain.connect(audioCtx.destination)
  osc.frequency.value = 700
  gain.gain.value = 0.02
  osc.start()
  osc.stop(audioCtx.currentTime + 0.04)
}

function resetEffects() {
  document.body.classList.remove("flash-danger")
  num.classList.remove("dangerNumber")
}

function updateBars(val) {
  let bars = document.querySelectorAll(".bar")
  bars.forEach((b, index) => {
    if (index < val / 4) {
      if (index < 8) b.style.background = "#35ff5c"
      else if (index < 16) b.style.background = "#f6ff35"
      else if (index < 22) b.style.background = "#ff9d00"
      else b.style.background = "#ff2a2a"
    } else {
      b.style.background = "#222"
    }
  })

  if (val >= 90) {
    num.classList.add("dangerNumber")
    document.body.classList.add("flash-danger")
  } else {
    num.classList.remove("dangerNumber")
    document.body.classList.remove("flash-danger")
  }
}

modeBtn.onclick = function () {
  if (isRunning) return

  mode = mode === 0 ? 1 : 0
  resetEffects()
  value = 0
  num.innerText = 0
  updateBars(0)
  msg.innerText = "Режим змінено"
  modeBtn.innerText = mode === 0 ? "Рандомний" : "Утримання"
}

/* 🔥 ПЛАВНИЙ РАНДОМ */
function randomMode() {
  if (isRunning || mode !== 0) return

  isRunning = true
  resetEffects()
  msg.innerText = "Вимірюється..."

  let target = Math.floor(Math.random() * 100)
  let steps = 0

  let interval = setInterval(() => {

    if (value < target) value += Math.random() * 4
    else if (value > target) value -= Math.random() * 4

    value = Math.max(0, Math.min(100, Math.round(value)))

    if (value < 100) beep()

    num.innerText = value
    updateBars(value)

    steps++

    if (steps > 40 && Math.abs(value - target) < 2) {
      value = target
      num.innerText = target
      updateBars(target)

      if (target >= 90) msg.innerText = "КРИТИЧНИЙ ТИСК 🤯"
      else if (target >= 70) msg.innerText = "Потужний 💪"
      else if (target < 20) msg.innerText = "Ти не тискуєш"
      else msg.innerText = "Нормальний 👍"

      clearInterval(interval)
      isRunning = false
    }

  }, 60)
}

setInterval(() => {
  if (mode !== 1) return

  if (hold){
    if (value < 100){
      value += 2
      beep()
    }
  } else {
    value -= 1
  }

  if (value < 0) value = 0
  if (value > 100) value = 100

  num.innerText = value
  updateBars(value)

  if (value < 20) msg.innerText = "Ти не тискуєш"
  else if (value < 70) msg.innerText = "Нормальний 👍"
  else if (value < 90) msg.innerText = "Потужний 💪"
  else msg.innerText = "КРИТИЧНИЙ ТИСК 🤯"
}, 50)

btn.addEventListener("mousedown", () => { if (mode === 1) hold = true })
btn.addEventListener("mouseup", () => { hold = false })
btn.addEventListener("mouseleave", () => { hold = false })

btn.addEventListener("touchstart", (e) => { e.preventDefault(); if (mode === 1) hold = true })
btn.addEventListener("touchend", (e) => { e.preventDefault(); hold = false })
btn.addEventListener("touchcancel", (e) => { e.preventDefault(); hold = false })

btn.addEventListener("click", () => { randomMode() })
btn.addEventListener("touchend", () => { if (mode === 0) randomMode() })

</script>
</body>
</html>

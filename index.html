<!DOCTYPE html> 
<html lang="uk">
<head>
<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<title>Тискометр</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">

<style>
html, body{
  margin:0;
  padding:0;
  overflow:hidden;
  height:100%;
}

body{
  background:linear-gradient(180deg,#02162b,#000814);
  color:white;
  font-family:'Orbitron',sans-serif;
  display:flex;
  justify-content:center;
  align-items:center;
  touch-action:none;
  user-select:none;
}

/* 🔥 ЩЕ МЕНШИЙ */
.panel{
  background:#0b0f16;
  border-radius:20px;
  padding:20px;
  width:80%;
  max-width:320px;
  box-shadow:0 0 30px rgba(0,0,0,0.8);
  border:1px solid #2b2b2b;
}

.title{
  font-size:22px;
  text-align:center;
  color:#8ff5ff;
  margin-bottom:5px;
}

.subtitle{
  text-align:center;
  color:#aaa;
  margin-bottom:15px;
  font-size:12px;
}

.scaleBox{
  background:#05070a;
  border-radius:12px;
  padding:12px;
  border:1px solid #333;
  cursor:pointer;
}

.scale{
  display:flex;
  gap:3px;
  justify-content:center;
  margin:8px 0;
}

.bar{
  width:6px;
  height:28px;
  background:#222;
  border-radius:5px;
}

.bottom{
  display:flex;
  gap:10px;
  margin-top:15px;
}

.displayBox{
  flex:1;
  background:#05070a;
  border-radius:12px;
  padding:12px;
  border:1px solid #333;
}

.number{
  font-size:40px;
  text-align:center;
}

.modeBtn{
  padding:12px;
  border-radius:20px;
  border:none;
  font-size:13px;
  background:#00eaff;
  color:black;
  cursor:pointer;
}

.message{
  text-align:center;
  margin-top:10px;
  font-size:12px;
  color:#ccc;
}

.flash-danger {
  animation: flashDanger 1s infinite;
}

@keyframes flashDanger {
  50% { background:#5a0000; }
}

.dangerNumber{
  color:#ff2a2a;
}
</style>
</head>

<body>
<div class="panel">

  <div class="title">🇺🇦 ТИСКОМЕТР</div>
  <div class="subtitle">TM-v2.3 FINAL</div>

  <div class="scaleBox" id="btn">
    <div>ШКАЛА ТИСКУ</div>
    <div class="scale" id="scale"></div>
  </div>

  <div class="bottom">
    <div class="displayBox">
      <div class="number" id="num">0</div>
    </div>

    <button class="modeBtn" id="modeBtn">Рандомний</button>
  </div>

  <div class="message" id="msg">
    Натисни або утримуй
  </div>

</div>

<script>

// шкала
let scale = document.getElementById("scale")
for (let i = 0; i < 25; i++) {
  let bar = document.createElement("div")
  bar.className = "bar"
  scale.appendChild(bar)
}

let mode = 0
let isRunning = false
let hold = false
let value = 0

let btn = document.getElementById("btn")
let num = document.getElementById("num")
let msg = document.getElementById("msg")
let modeBtn = document.getElementById("modeBtn")

/* 🔊 звук */
let audioCtx = new (window.AudioContext || window.webkitAudioContext)()
function beep(){
  let osc = audioCtx.createOscillator()
  let gain = audioCtx.createGain()
  osc.connect(gain)
  gain.connect(audioCtx.destination)
  osc.frequency.value = 800
  gain.gain.value = 0.05
  osc.start()
  osc.stop(audioCtx.currentTime + 0.05)
}

function updateBars(val) {
  let bars = document.querySelectorAll(".bar")
  bars.forEach((b, i) => {
    b.style.background = i < val/4 ? "#35ff5c" : "#222"
  })
}

/* ❗ блок кнопки під час роботи */
modeBtn.onclick = function () {
  if(isRunning) return
  mode = mode === 0 ? 1 : 0
  value = 0
  num.innerText = 0
  updateBars(0)
  msg.innerText = "Режим змінено"
  modeBtn.innerText = mode === 0 ? "Рандомний" : "Утримання"
}

function randomMode() {
  if (isRunning || mode !== 0) return
  isRunning = true
  msg.innerText = "Вимірюється..."

  let i = 0
  let interval = setInterval(() => {

    beep() /* 🔊 звук */

    let result = Math.floor(Math.random() * 100)
    value = result
    num.innerText = result
    updateBars(result)

    i++
    if (i > 20) {
      clearInterval(interval)
      msg.innerText = "Готово"
      isRunning = false
    }

  }, 100)
}

setInterval(() => {
  if (mode !== 1) return

  if (hold){
    value += 2
    beep() /* 🔊 звук при утриманні */
  } else {
    value -= 1
  }

  if (value < 0) value = 0
  if (value > 100) value = 100

  num.innerText = value
  updateBars(value)

}, 60)

btn.addEventListener("mousedown", () => { if (mode === 1) hold = true })
btn.addEventListener("mouseup", () => hold = false)
btn.addEventListener("mouseleave", () => hold = false)

btn.addEventListener("touchstart", (e) => { e.preventDefault(); if (mode === 1) hold = true })
btn.addEventListener("touchend", (e) => { e.preventDefault(); hold = false })

btn.addEventListener("click", () => randomMode())

</script>
</body>
</html>
